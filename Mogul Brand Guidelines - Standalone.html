    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {

            const reader = ds.readable.getReader();

            while (true) {
              const { done, value } = await reader.read();

              totalLen += value.length;

    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.

      ';</' + 'script>';

    // would push the parser into quirks mode. DOMParser always emits a <head>

,sans-serif; font-weight:500; font-size:clamp(20px,2.4vw,30px); color:#08080A; letter-spacing:-0.02em;\">Mogul Signature Gradient<\u002Fspan>\n    <\u002Fdiv>\n\n    <div style=\"display:grid; grid-template-columns:repeat(4,1fr); gap:18px; margin-bottom:36px;\">\n      <div style=\"background:#0F0F11; border:1px solid rgba(255,255,255,0.08); border-radius:14px; padding:18px; display:flex; align-items:center; gap:12px;\"><span style=\"width:34px; height:34px; border-radius:8px; background:#FFAE3C; flex:none;\"><\u002Fspan><div><div style=\"font-size:13px; font-weight:600;\">0%<\u002Fdiv><div style=\"font-size:12px; color:#8A8A94;\">#FFAE3C<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n      <div style=\"background:#0F0F11; border:1px solid rgba(255,255,255,0.08); border-radius:14px; padding:18px; display:flex; align-items:center; gap:12px;\"><span style=\"width:34px; height:34px; border-radius:8px; background:#FF3D8C; flex:none;\"><\u002Fspan><div><div style=\"font-size:13px; font-weight:600;\">38%<\u002Fdiv><div style=\"font-size:12px; color:#8A8A94;\">#FF3D8C<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n      <div style=\"background:#0F0F11; border:1px solid rgba(255,255,255,0.08); border-radius:14px; padding:18px; display:flex; align-items:center; gap:12px;\"><span style=\"width:34px; height:34px; border-radius:8px; background:#9E4DF2; flex:none;\"><\u002Fspan><div><div style=\"font-size:13px; font-weight:600;\">68%<\u002Fdiv><div style=\"font-size:12px; color:#8A8A94;\">#9E4DF2<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n      <div style=\"background:#0F0F11; border:1px solid rgba(255,255,255,0.08); border-radius:14px; padding:18px; display:flex; align-items:center; gap:12px;\"><span style=\"width:34px; height:34px; border-radius:8px; background:#1EB4FF; flex:none;\"><\u002Fspan><div><div style=\"font-size:13px; font-weight:600;\">100%<\u002Fdiv><div style=\"font-size:12px; color:#8A8A94;\">#1EB4FF<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- applications -->\n    <div style=\"d -spacing:-0.02em; margin-bottom:10px;\">Capable<\u002Fdiv><p style=\"font-size:14.5px; line-height:1.6; color:#8A8A94; margin:0;\">We've shipped it before. Proof over promises; specifics over adjectives.<\u002Fp><\u002Fdiv>\n      <div style=\"background:#0F0F11; border:1px solid rgba(255,255,255,0.08); border-radius:18px; padding:32px;\"><div style=\"font-family:'Clash Grotesk',sans-serif; font-weight:500; font-size:22px; letter-spacing:-0.02em; margin-bottom:10px;\">Electric<\u002Fdiv><p style=\"font-size:14.5px; line-height:1.6; color:#8A8A94; margin:0;\">A spark of energy in every line. Optimistic, forward-leaning, alive.<\u002Fp><\u002Fdiv>\n    <\u002Fdiv>\n\n    <div style=\"display:grid; grid-template-columns:1fr 1fr; gap:18px;\">\n      <div style=\"background:linear-gradient(160deg,rgba(31,182,168,0.08),#0F0F11); border:1px solid rgba(46,204,113,0.25); border-radius:18px; padding:34px;\">\n        <span style=\"display:inline-flex; align-items:center; gap:8px; font-size:13px; color:#2ECC71; font-weight:600; margin-bottom:18px;\"><span style=\"width:20px; height:20px; border-radius:6px; background:#1FB67A; display:flex; align-items:center; justify-content:center; color:#fff; font-size:12px;\">✓<\u002Fspan> We say<\u002Fspan>\n        <p style=\"font-family:'Clash Grotesk',sans-serif; font-size:19px; line-height:1.5; margin:0 0 14px; letter-spacing:-0.01em;\">“One team for your brand and the systems behind it.”<\u002Fp>\n        <p style=\"font-family:'Clash Grotesk',sans-serif; font-size:19px; line-height:1.5; margin:0; letter-spacing:-0.01em; color:#C8C8CE;\">“We design it, build it, then automate the busywork.”<\u002Fp>\n      <\u002Fdiv>\n      <div style=\"background:linear-gradient(160deg,rgba(255,61,92,0.07),#0F0F11); border:1px solid rgba(255,61,92,0.22); border-radius:18px; padding:34px;\">\n        <span style=\"display:inline-flex; align-items:center; gap:8px; font-size:13px; color:#FF6B7E; font-weight:600; margin-bottom:18px;\"><span style=\"widt
